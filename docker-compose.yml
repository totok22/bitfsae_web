services:
  # 1. MQTT Broker
  mosquitto:
    image: eclipse-mosquitto
    container_name: fsae_mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: always

  # 2. InfluxDB 1.8
  influxdb:
    image: influxdb:1.8
    container_name: fsae_influxdb
    ports:
      - "8086:8086"
    volumes:
      - ./influxdb_1.8_data:/var/lib/influxdb
    environment:
      - INFLUXDB_DB=fsae_db
    restart: always

  # 3. Telegraf
  telegraf:
    image: telegraf:1.38.2
    container_name: fsae_telegraf
    volumes:
      # 配置文件挂载
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      # Protos 定义文件挂载 (只保留这一行正确的相对路径即可)
      - ./protos:/etc/telegraf/protos:ro
    depends_on:
      - influxdb
      - mosquitto
    restart: always

  # 4. Grafana
  grafana:
    image: grafana/grafana
    container_name: fsae_grafana
    ports:
    - "127.0.0.1:3001:3000"
    environment:
      - GF_DASHBOARDS_MIN_REFRESH_INTERVAL=200ms
      - GF_SERVER_DOMAIN=bitfsae.com
      - GF_SERVER_ROOT_URL=https://bitfsae.com/monitor/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - ./grafana_data:/var/lib/grafana
    restart: always

  # Current production Web is hosted by host nginx + PM2, not by a compose service.
